<div class="item {% if post.star %}star{% endif %}">
    <a class="url" href="{{base}}{{ post.url }}">
        <aside class="date"><time datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date: "%b %Y" }}</time></aside>
        <h3 class="title">{{ post.title }}</h3>
        {% if post.tags contains 'research' %}
        <span class="badge research">Research</span>
        {% endif %}
    </a>
</div>
