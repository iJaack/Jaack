<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="200" y1="20" x2="1400" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16284C"/>
      <stop offset="0.5" stop-color="#0C1730"/>
      <stop offset="1" stop-color="#070C18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 100) rotate(140) scale(420 400)">
      <stop stop-color="#7AA2FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7AA2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(460 400) rotate(-20) scale(520 200)">
      <stop stop-color="#FF7A90" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF7A90" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-100" y="-100" width="1800" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <linearGradient id="gold" x1="200" y1="300" x2="1420" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFCC66"/>
      <stop offset="1" stop-color="#FFE2A0"/>
    </linearGradient>
    <linearGradient id="red" x1="200" y1="250" x2="1420" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A90"/>
      <stop offset="1" stop-color="#FFB0BC"/>
    </linearGradient>
    <linearGradient id="green" x1="200" y1="340" x2="1420" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5DD39E"/>
      <stop offset="1" stop-color="#A4F3CE"/>
    </linearGradient>
    <linearGradient id="blue" x1="200" y1="360" x2="1420" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AA2FF"/>
      <stop offset="1" stop-color="#B5CCFF"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" rx="20" fill="url(#bg)"/>
  <rect width="1600" height="500" rx="20" fill="url(#glow1)"/>
  <rect width="1600" height="500" rx="20" fill="url(#glow2)"/>

  <!-- Grid -->
  <g opacity="0.32">
    <path d="M200 420H1420" stroke="#2C426B"/>
    <path d="M200 350H1420" stroke="#23385B"/>
    <path d="M200 280H1420" stroke="#23385B"/>
    <path d="M200 210H1420" stroke="#23385B"/>
    <path d="M200 140H1420" stroke="#23385B"/>
    <path d="M200 70H1420" stroke="#2C426B"/>
    <path d="M200 420V70" stroke="#2C426B"/>
    <path d="M444 420V70" stroke="#23385B"/>
    <path d="M688 420V70" stroke="#23385B"/>
    <path d="M932 420V70" stroke="#23385B"/>
    <path d="M1176 420V70" stroke="#23385B"/>
    <path d="M1420 420V70" stroke="#2C426B"/>
  </g>

  <!-- Ghost lines -->
  <g opacity="0.18">
    <path d="M260 418L400 340L540 346L680 268L820 240L960 190L1100 196L1240 142" stroke="#7AA2FF" stroke-width="2"/>
    <path d="M260 418L400 318L540 286L680 276L820 216L960 212L1100 162L1240 160" stroke="#5DD39E" stroke-width="2"/>
    <path d="M260 418L400 280L540 200L680 152L820 118L960 86L1100 68L1240 54" stroke="#FF7A90" stroke-width="2"/>
  </g>

  <!-- Glow curves -->
  <g filter="url(#soft)">
    <path d="M230 330C290 330 340 300 400 300C460 300 520 340 580 340C640 340 700 260 760 260C820 260 880 310 940 310C1000 310 1060 210 1120 210C1180 210 1240 250 1300 250" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    <path d="M230 310C290 310 340 240 400 240C460 240 520 274 580 274C640 274 700 160 760 160C820 160 880 206 940 206C1000 206 1060 120 1120 120C1180 120 1240 150 1300 150" stroke="url(#red)" stroke-width="9" stroke-linecap="round"/>
    <path d="M230 358C290 358 340 336 400 336C460 336 520 306 580 306C640 306 700 284 760 284C820 284 880 266 940 266C1000 266 1060 254 1120 254C1180 254 1240 246 1300 246" stroke="url(#green)" stroke-width="8" stroke-linecap="round"/>
    <path d="M230 380C290 380 340 364 400 364C460 364 520 350 580 350C640 350 700 330 760 330C820 330 880 302 940 302C1000 302 1060 262 1120 262C1180 262 1240 210 1300 210" stroke="url(#blue)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Sharp curves -->
  <g>
    <path d="M230 330C290 330 340 300 400 300C460 300 520 340 580 340C640 340 700 260 760 260C820 260 880 310 940 310C1000 310 1060 210 1120 210C1180 210 1240 250 1300 250" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M230 310C290 310 340 240 400 240C460 240 520 274 580 274C640 274 700 160 760 160C820 160 880 206 940 206C1000 206 1060 120 1120 120C1180 120 1240 150 1300 150" stroke="url(#red)" stroke-width="4" stroke-linecap="round"/>
    <path d="M230 358C290 358 340 336 400 336C460 336 520 306 580 306C640 306 700 284 760 284C820 284 880 266 940 266C1000 266 1060 254 1120 254C1180 254 1240 246 1300 246" stroke="url(#green)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M230 380C290 380 340 364 400 364C460 364 520 350 580 350C640 350 700 330 760 330C820 330 880 302 940 302C1000 302 1060 262 1120 262C1180 262 1240 210 1300 210" stroke="url(#blue)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Title box -->
  <g>
    <rect x="60" y="36" width="440" height="160" rx="16" fill="#0C1830" fill-opacity="0.90" stroke="#22385F"/>
    <text x="88" y="82" fill="#EDF3FF" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">L1 validator fees</text>
    <text x="88" y="120" fill="#FFCC66" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600">AVAX buy pressure</text>
    <text x="88" y="150" fill="#BCC8E8" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500">four fee curves compared</text>
    <text x="88" y="176" fill="#85A5EA" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500">ACP-77 + three ACP-255 variants</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="1166" y="36" width="240" height="152" rx="14" fill="#0C1830" fill-opacity="0.88" stroke="#22385F"/>
    <circle cx="1196" cy="70" r="6" fill="#FFCC66"/>
    <text x="1212" y="75" fill="#E2EBFF" font-family="Inter, Arial, sans-serif" font-size="18">ACP-77</text>
    <circle cx="1196" cy="102" r="6" fill="#FF7A90"/>
    <text x="1212" y="107" fill="#E2EBFF" font-family="Inter, Arial, sans-serif" font-size="18">Gaussian 255</text>
    <circle cx="1196" cy="134" r="6" fill="#5DD39E"/>
    <text x="1212" y="139" fill="#E2EBFF" font-family="Inter, Arial, sans-serif" font-size="18">Monotonic 255</text>
    <circle cx="1196" cy="166" r="6" fill="#7AA2FF"/>
    <text x="1212" y="171" fill="#E2EBFF" font-family="Inter, Arial, sans-serif" font-size="18">Hybrid 255</text>
  </g>

  <!-- X-axis labels -->
  <g opacity="0.9">
    <text x="195" y="448" fill="#97ABDA" font-family="Inter, Arial, sans-serif" font-size="15">0</text>
    <text x="434" y="448" fill="#97ABDA" font-family="Inter, Arial, sans-serif" font-size="15">5k</text>
    <text x="678" y="448" fill="#97ABDA" font-family="Inter, Arial, sans-serif" font-size="15">10k</text>
    <text x="922" y="448" fill="#97ABDA" font-family="Inter, Arial, sans-serif" font-size="15">15k</text>
    <text x="1166" y="448" fill="#97ABDA" font-family="Inter, Arial, sans-serif" font-size="15">20k</text>
    <text x="1040" y="478" fill="#B4C4EA" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="500">total network validators (V)</text>
  </g>
</svg>
